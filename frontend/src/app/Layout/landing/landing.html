<div class="min-h-screen bg-blue-50 p-8 font-sans">
  <div class="max-w-6xl mx-auto">
    
    <!-- Simplified Header -->
    <div class="text-center mb-12">
      <h1 class="text-4xl font-bold text-gray-800">Classic Business Platform</h1>
      <p class="text-gray-600 mt-2 text-lg">Select a member portal to continue</p>
    </div>

    <!-- Member Grid -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
      <div 
        *ngFor="let member of members" 
        (click)="openLogin(member.id)" 
        class="bg-white p-8 rounded-lg border border-gray-200 shadow-sm text-center cursor-pointer hover:border-blue-500 transition-colors"
      >
        <!-- Simple Avatar -->
        <div class="w-20 h-20 bg-blue-600 text-white rounded-full flex items-center justify-center text-2xl font-bold mx-auto mb-4">
          {{ member.name.charAt(0) }}
        </div>

        <h2 class="text-xl font-bold text-gray-800">{{ member.name }}</h2>
        <p class="text-gray-500 mb-6">Team Member</p>
        
        <button class="w-full py-2 bg-blue-600 text-white rounded font-semibold hover:bg-blue-700 transition-colors">
          Enter Portal
        </button>
      </div>
    </div>

  </div>
</div>
