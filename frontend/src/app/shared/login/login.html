<div class="min-h-screen bg-gradient-to-br from-slate-950 via-indigo-950 to-slate-900 flex items-center justify-center px-6">

  <div class="w-full max-w-2xl bg-white/95 backdrop-blur-xl rounded-3xl shadow-2xl p-14 border border-white/30">

    <div class="flex flex-col items-center mb-10">
      <img
        [src]="selectedMember?.photo"
        alt="profile"
        class="w-28 h-28 rounded-full object-cover border-4 border-cyan-500 shadow-xl"
      />

      <h2 class="mt-5 text-4xl font-bold text-gray-800">
        {{ selectedMember?.name }}
      </h2>

      <p class="text-gray-500 mt-2 text-lg">
        Member Secure Login
      </p>
    </div>

    <div class="mb-8 text-center">
      <h3 class="text-3xl font-bold text-gray-800">
        Welcome Back
      </h3>
      <p class="text-gray-500 text-base mt-2">
        Please enter your credentials to continue
      </p>
    </div>

    <div *ngIf="errorMessage" class="mb-6 p-4 bg-red-50 border-l-4 border-red-500 text-red-700 text-sm font-medium rounded-r-lg animate-pulse">
      <div class="flex items-center">
        <span class="mr-2">⚠️</span>
        {{ errorMessage }}
      </div>
    </div>

    <label class="block text-lg font-semibold text-gray-700 mb-3">
      Username
    </label>

    <input
      type="text"
      name="username"
      [(ngModel)]="usernameInput"
      placeholder="Enter username"
      class="w-full px-5 py-4 text-lg rounded-2xl border border-gray-300 focus:ring-2 focus:ring-cyan-500 outline-none mb-6 transition-all"
    >

    <label class="block text-lg font-semibold text-gray-700 mb-3">
      Password
    </label>

    <input
      type="password"
      name="password"
      [(ngModel)]="passwordInput"
      placeholder="Enter password"
      class="w-full px-5 py-4 text-lg rounded-2xl border border-gray-300 focus:ring-2 focus:ring-cyan-500 outline-none mb-8 transition-all"
    >

    <div class="flex justify-between items-center mb-8 text-base">
      <label class="flex items-center gap-2 text-gray-600 cursor-pointer">
        <input type="checkbox" class="w-4 h-4 accent-cyan-600">
        Remember me
      </label>

      <a href="#" class="text-cyan-600 hover:underline font-medium">
        Forgot password?
      </a>
    </div>

    <button 
      (click)="onLogin()"
      class="w-full bg-gradient-to-r from-cyan-500 via-blue-500 to-indigo-600 text-white py-4 rounded-2xl font-bold text-xl hover:scale-[1.02] active:scale-95 transition duration-300 shadow-lg"
    >
      Login
    </button>

  </div>

</div>
