<div class="min-h-screen bg-blue-50 flex items-center justify-center p-6 font-sans">
  <div class="w-full max-w-md bg-white p-10 rounded-lg border border-gray-300 shadow-sm">
    
    <!-- Profile Header -->
    <div class="text-center mb-8">
      <div class="w-24 h-24 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4 border border-gray-200 overflow-hidden">
         <img *ngIf="selectedMember?.photo" [src]="selectedMember?.photo" alt="profile" class="w-full h-full object-cover" />
         <span *ngIf="!selectedMember?.photo" class="text-3xl font-bold text-blue-600">{{ selectedMember?.name?.charAt(0) }}</span>
      </div>
      <h2 class="text-3xl font-bold text-gray-800">{{ selectedMember?.name }}</h2>
      <p class="text-gray-500">Secure Member Login</p>
    </div>

    <!-- Error Message -->
    <div *ngIf="errorMessage" class="mb-4 p-3 bg-red-100 border border-red-400 text-red-700 text-sm rounded">
      <strong>Error:</strong> {{ errorMessage }}
    </div>

    <!-- Form -->
    <div class="space-y-6">
      <div>
        <label class="block text-gray-700 font-semibold mb-2">Username</label>
        <input type="text" [(ngModel)]="usernameInput" class="w-full px-4 py-2 border border-gray-300 rounded focus:border-blue-500 outline-none" placeholder="Enter username">
      </div>

      <div>
        <label class="block text-gray-700 font-semibold mb-2">Password</label>
        <input type="password" [(ngModel)]="passwordInput" class="w-full px-4 py-2 border border-gray-300 rounded focus:border-blue-500 outline-none" placeholder="Enter password">
      </div>

      <button (click)="onLogin()" class="w-full py-3 bg-blue-600 text-white rounded font-bold hover:bg-blue-700 transition-colors">
        Login
      </button>
    </div>

    <div class="mt-6 text-center text-sm text-gray-500">
      <p>Classic Business Management System</p>
    </div>

  </div>
</div>
